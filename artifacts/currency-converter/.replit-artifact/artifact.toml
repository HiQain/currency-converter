kind = "web"
previewPath = "/"
title = "Currency Converter"
version = "1.0.0"
id = "artifacts/currency-converter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23428

[services.development]
run = "pnpm --filter @workspace/currency-converter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/currency-converter", "run", "build" ]
publicDir = "artifacts/currency-converter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23428"
BASE_PATH = "/"
